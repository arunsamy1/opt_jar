<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-dumper One Liner Q</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .header {
            background: #f5f5f5;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #e94560;
        }

        .header h1 {
            font-size: 24px;
            color: #e94560;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: '💬';
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b8a;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #1a1a2e;
            border: 1px solid #e94560;
        }

        .btn-secondary:hover {
            background: #1a1a2e;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            pointer-events: none;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .sidebar {
            width: 350px;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid #e0e0e0;
            transition: width 0.3s ease;
        }

        .sidebar.collapsed {
            width: 50px;
            padding: 10px 5px;
        }

        .sidebar.collapsed .sidebar-content {
            display: none;
        }

        .sidebar-toggle {
            display: block;
            width: 100%;
            padding: 8px;
            background: #e0e0e0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .sidebar .file-input-wrapper {
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #00d9a5);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .one-liner-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
        }

        .one-liner-text {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a2e;
            text-align: left;
            width: 100%;
            line-height: 1.5;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            text-align: center;
            color: #666;
        }

        .empty-state h2 {
            font-size: 28px;
            margin-bottom: 16px;
            color: #1a1a2e;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 24px;
        }

        .hidden {
            display: none !important;
        }

        .navigation-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
        }

        .nav-btn {
            min-width: 120px;
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: white;
            max-width: 320px;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .toast-success { background: #00a87d; }
        .toast-error   { background: #e94560; }
        .toast-info    { background: #1a1a2e; }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100% !important;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 10px;
                gap: 10px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: #f5f5f5;
                max-height: 60vh;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .sidebar.collapsed {
                width: 100% !important;
                max-height: 56px;
                overflow: hidden;
            }

            .sidebar-toggle {
                width: auto;
                padding: 10px 15px;
            }

            .sidebar-content {
                display: flex !important;
                flex-wrap: wrap;
                gap: 10px;
                width: 100%;
            }

            .sidebar.collapsed .sidebar-content {
                display: none !important;
            }

            .file-input-wrapper {
                flex: 1 1 100%;
            }

            .file-input-wrapper .btn {
                width: 100%;
            }

            .main-container {
                padding: 12px;
            }

            .one-liner-card {
                padding: 20px;
                min-height: 150px;
            }

            .one-liner-text {
                font-size: 20px;
            }

            .btn {
                padding: 12px 16px;
                font-size: 14px;
                min-height: 44px;
            }

            .navigation-buttons {
                flex-wrap: wrap;
                gap: 10px;
            }

            .navigation-buttons .btn {
                flex: 1 1 45%;
                min-width: 100px;
                justify-content: center;
            }

            .progress-section {
                margin-bottom: 12px;
            }

            h1 {
                font-size: 20px;
            }

            h2 {
                font-size: 18px;
            }

            .header h1 {
                font-size: 18px;
                margin-right: 10px;
            }

            .toast-container {
                bottom: 16px;
                right: 16px;
                left: 16px;
            }

            .toast {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                max-height: 60vh;
            }

            .navigation-buttons .btn {
                flex: 1 1 100%;
            }

            .btn {
                padding: 10px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar collapsed">
            <button class="sidebar-toggle" onclick="app.toggleSidebar()">☰</button>
            <div class="sidebar-content">
                <div class="file-input-wrapper" style="width: 100%;">
                    <input type="file" id="oneLinerFileInput" accept=".txt">
                    <button class="btn btn-primary" onclick="document.getElementById('oneLinerFileInput').click()" style="width: 100%;">
                        📂 Import Text
                    </button>
                </div>
                <button class="btn btn-secondary" id="shuffleLinesBtn" onclick="app.shuffleLines()" style="width: 100%; margin-top: 20px;" disabled>
                    🔀 Shuffle
                </button>
                <button class="btn btn-secondary" id="clearStateBtn" onclick="app.clearAndReset()" style="width: 100%; margin-top: 20px;">
                    🗑️ Clear Progress
                </button>
                <button class="btn btn-secondary" style="width: 100%; margin-top: 20px;" onclick="window.open('README-oneline-q.html', '_blank')">
                    📖 Documentation
                </button>
            </div>
        </aside>

        <main class="main-wrapper">
            <header class="header">
                <h1>e-dumper One Liner Q <span style="font-size: 14px; color: #666;">v2.0</span></h1>
            </header>

            <div class="main-container">
                <div id="emptyState" class="empty-state">
                    <h2>Welcome to e-dumper One Liner Q</h2>
                    <p>Import a text file to get started using the button in the sidebar.</p>
                </div>

                <div id="oneLinerArea" class="hidden">
                    <div class="progress-section">
                        <div class="progress-text">
                            <span id="oneLinerProgressText">Line 0 of 0</span>
                            <span id="oneLinerProgressPercent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="oneLinerProgressFill" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="one-liner-card">
                        <div class="one-liner-text" id="oneLinerText">No text loaded</div>
                    </div>

                    <div class="navigation-buttons">
                        <button class="btn btn-secondary nav-btn" id="oneLinerPrevBtn" onclick="app.prevOneLiner()">
                            ← Previous
                        </button>
                        <button class="btn btn-primary nav-btn" id="oneLinerNextBtn" onclick="app.nextOneLiner()">
                            Next →
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const app = {
            oneLinerLines: [],
            oneLinerIndex: 0,

            showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },

            saveState() {
                try {
                    const state = {
                        lines: app.oneLinerLines,
                        index: app.oneLinerIndex
                    };
                    localStorage.setItem('edumperOneLinerState', JSON.stringify(state));
                } catch (e) {
                    console.warn('Could not save state:', e);
                }
            },

            loadState() {
                try {
                    const saved = localStorage.getItem('edumperOneLinerState');
                    if (!saved) return false;

                    const state = JSON.parse(saved);

                    if (state.lines && state.lines.length > 0) {
                        app.oneLinerLines = state.lines;
                        app.oneLinerIndex = state.index || 0;
                        app.renderOneLinerCard();
                    }

                    return true;
                } catch (e) {
                    console.warn('Could not load state:', e);
                    return false;
                }
            },

            clearState() {
                try {
                    localStorage.removeItem('edumperOneLinerState');
                } catch (e) {
                    console.warn('Could not clear state:', e);
                }
            },

            clearAndReset() {
                if (confirm('Are you sure you want to clear all saved progress? This cannot be undone.')) {
                    app.clearState();
                    location.reload();
                }
            },

            updateMainWrapperMargin() {
                if (window.innerWidth > 768) {
                    document.querySelector('.main-wrapper').style.marginTop = '';
                    return;
                }
                const sidebar = document.querySelector('.sidebar');
                document.querySelector('.main-wrapper').style.marginTop = sidebar.offsetHeight + 'px';
            },

            init() {
                document.getElementById('oneLinerFileInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onerror = () => {
                            app.showToast('Error reading file. Please try again.', 'error');
                        };
                        reader.onload = (event) => {
                            app.loadOneLiner(event.target.result);
                        };
                        reader.readAsText(file);
                    }
                });

                document.addEventListener('keydown', (e) => {
                    const oneLinerArea = document.getElementById('oneLinerArea');
                    if (oneLinerArea.classList.contains('hidden')) return;

                    if (e.key === 'ArrowRight') {
                        app.nextOneLiner();
                    } else if (e.key === 'ArrowLeft') {
                        app.prevOneLiner();
                    }
                });

                app.updateMainWrapperMargin();
                window.addEventListener('resize', app.updateMainWrapperMargin);
            },

            toggleSidebar() {
                const sidebar = document.querySelector('.sidebar');
                sidebar.classList.toggle('collapsed');
                app.updateMainWrapperMargin();
            },

            collapseSidebar() {
                const sidebar = document.querySelector('.sidebar');
                sidebar.classList.add('collapsed');
                app.updateMainWrapperMargin();
            },

            loadOneLiner(content) {
                try {
                    const lines = content.split('\n');
                    app.oneLinerLines = [];
                    app.oneLinerIndex = 0;

                    for (let line of lines) {
                        line = line.trim();
                        if (line) {
                            app.oneLinerLines.push(line);
                        }
                    }

                    if (app.oneLinerLines.length > 0) {
                        app.showToast(`Loaded ${app.oneLinerLines.length} lines`, 'success');
                        document.getElementById('emptyState').classList.add('hidden');
                        document.getElementById('oneLinerArea').classList.remove('hidden');
                        app.renderOneLinerCard();
                        app.collapseSidebar();
                        app.saveState();
                    } else {
                        app.showToast('No text found in file.', 'error');
                    }
                } catch (e) {
                    console.error('Error loading one liner:', e);
                    app.showToast('Error loading text file.', 'error');
                }
            },

            renderOneLinerCard() {
                if (app.oneLinerLines.length === 0) return;

                const line = app.oneLinerLines[app.oneLinerIndex];
                document.getElementById('oneLinerText').textContent = line;

                document.getElementById('oneLinerProgressText').textContent =
                    `Line ${app.oneLinerIndex + 1} of ${app.oneLinerLines.length}`;
                document.getElementById('oneLinerProgressPercent').textContent =
                    `${Math.round(((app.oneLinerIndex + 1) / app.oneLinerLines.length) * 100)}%`;
                document.getElementById('oneLinerProgressFill').style.width =
                    `${Math.round(((app.oneLinerIndex + 1) / app.oneLinerLines.length) * 100)}%`;

                document.getElementById('oneLinerPrevBtn').disabled = app.oneLinerIndex === 0;
                document.getElementById('oneLinerNextBtn').disabled = app.oneLinerIndex === app.oneLinerLines.length - 1;

                document.getElementById('shuffleLinesBtn').disabled = false;
            },

            nextOneLiner() {
                if (app.oneLinerIndex < app.oneLinerLines.length - 1) {
                    app.oneLinerIndex++;
                    app.renderOneLinerCard();
                    app.saveState();
                }
            },

            prevOneLiner() {
                if (app.oneLinerIndex > 0) {
                    app.oneLinerIndex--;
                    app.renderOneLinerCard();
                    app.saveState();
                }
            },

            shuffleLines() {
                if (app.oneLinerLines.length === 0) return;

                for (let i = app.oneLinerLines.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [app.oneLinerLines[i], app.oneLinerLines[j]] = [app.oneLinerLines[j], app.oneLinerLines[i]];
                }

                app.oneLinerIndex = 0;
                app.renderOneLinerCard();
                app.saveState();
                app.showToast('Lines shuffled', 'success');
            }
        };

        app.init();
        app.loadState();
    </script>
</body>
</html>
