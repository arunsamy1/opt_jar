<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-dumper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #f5f5f5;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #e94560;
        }

        .header h1 {
            font-size: 24px;
            color: #e94560;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: '📚';
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b8a;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #1a1a2e;
            border: 1px solid #e94560;
        }

        .btn-secondary:hover {
            background: #1a1a2e;
        }

        .btn-success {
            background: #00d9a5;
            color: #0f0f1a;
        }

        .btn-success:hover {
            background: #00ffb8;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 350px;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid #e0e0e0;
            transition: width 0.3s ease;
        }

        .sidebar.collapsed {
            width: 50px;
            padding: 10px 5px;
        }

        .sidebar.collapsed .sidebar-content {
            display: none;
        }

        .sidebar-toggle {
            display: block;
            width: 100%;
            padding: 8px;
            background: #e0e0e0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            margin-bottom: 10px;
            margin-top: 60px;
        }

        .sidebar.collapsed .sidebar-toggle {
            display: block;
        }

        .sidebar:not(.collapsed) .sidebar-toggle {
            display: none;
        }

        .sidebar .sidebar-toggle-expand {
            display: block;
            width: 100%;
            padding: 8px;
            background: #e0e0e0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            margin-bottom: 10px;
            margin-top: 60px;
        }

        .sidebar.collapsed .sidebar-toggle-expand {
            display: none;
        }

        .sidebar .file-input-wrapper {
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #00d9a5);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 14px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-item.correct { color: #00a87d; }
        .stat-item.wrong { color: #e94560; }
        .stat-item.flagged { color: #f59e0b; }

        .question-panel {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 60px;
            margin-bottom: 24px;
            min-height: 500px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .option-btn {
            padding: 16px 20px;
            background: #ffffff;
            border: 2px solid #d0d0d0;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #e94560;
            background: #fff5f5;
        }

        .option-btn.selected {
            border-color: #e94560;
            background: #fff0f0;
        }

        .option-btn.correct {
            border-color: #00a87d;
            background: #e8faf4;
        }

        .option-btn.incorrect {
            border-color: #e94560;
            background: #ffe8ea;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .flagged-indicator {
            display: inline-block;
            padding: 2px 8px;
            background: #f59e0b;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .feedback-panel {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 16px;
            font-weight: 600;
        }

        .feedback-panel.show {
            display: block;
        }

        .feedback-panel.correct {
            background: #e8faf4;
            border: 1px solid #00a87d;
            color: #00a87d;
        }

        .feedback-panel.incorrect {
            background: #ffe8ea;
            border: 1px solid #e94560;
            color: #e94560;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 48px;
        }

        .show-answer-btn {
            min-width: 140px;
        }

        .navigation-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
        }

        .nav-btn {
            min-width: 120px;
        }

        .footer {
            background: #f5f5f5;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            gap: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            text-align: center;
            color: #666;
        }

        .empty-state h2 {
            font-size: 28px;
            margin-bottom: 16px;
            color: #1a1a2e;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 24px;
        }

        .review-header {
            margin-bottom: 30px;
        }

        .review-header h2 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .review-stats {
            display: flex;
            gap: 24px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 16px;
        }

        .review-stats .correct {
            color: #00a87d;
            font-weight: 600;
        }

        .review-stats .incorrect {
            color: #e94560;
            font-weight: 600;
        }

        .review-question-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .review-question-item.correct {
            border-left: 4px solid #00a87d;
        }

        .review-question-item.incorrect {
            border-left: 4px solid #e94560;
        }

        .review-question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1a1a2e;
        }

        .review-question-status {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
        }

        .review-question-status.correct {
            background: #e8faf4;
            color: #00a87d;
        }

        .review-question-status.incorrect {
            background: #ffe8ea;
            color: #e94560;
        }

        .review-option {
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .review-option.correct {
            background: #e8faf4;
            border-color: #00a87d;
        }

        .review-option.selected {
            background: #fff5f5;
            border-color: #e94560;
        }

        .review-option.selected.correct {
            background: #e8faf4;
            border-color: #00a87d;
        }

        .word-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 60px;
            margin-bottom: 24px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
        }

        .word-text {
            font-size: 48px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 40px;
            text-align: left;
            width: 100%;
        }

        .word-meaning {
            font-size: 24px;
            color: #666;
            margin-bottom: 40px;
            display: none;
            text-align: left;
            width: 100%;
        }

        .word-meaning.show {
            display: block;
        }

        .word-meaning.revealed {
            color: #00a87d;
            font-weight: 600;
        }

        .word-progress {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }

        .jump-to-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .jump-to-container input {
            width: 50px;
            padding: 8px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }

        .jump-to-container .btn {
            padding: 8px 12px;
            font-size: 14px;
        }

        .word-actions {
            display: flex;
            gap: 16px;
            margin-top: 30px;
        }

        .flagged-word-indicator {
            display: inline-block;
            padding: 4px 12px;
            background: #f59e0b;
            color: white;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .one-liner-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
        }

        .one-liner-text {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a2e;
            text-align: left;
            width: 100%;
        }

        .one-liner-text {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a2e;
            line-height: 1.5;
        }

        .one-liner-counter {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        .settings-group {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 180px;
        }

        .settings-group label {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .settings-group select {
            flex: 1;
            width: 150px;
            padding: 8px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .settings-group select:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #1a1a2e;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .modal-close:hover {
            color: #e94560;
        }

        .flagged-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .flagged-item {
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .flagged-item:hover {
            border-color: #e94560;
            background: #fff5f5;
        }

        .flagged-item-number {
            font-weight: 600;
            color: #e94560;
            margin-bottom: 8px;
        }

        .flagged-item-text {
            font-size: 14px;
            color: #1a1a2e;
            line-height: 1.4;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100% !important;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 10px;
                gap: 10px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: #f5f5f5;
                max-height: 200px;
                overflow-y: auto;
            }

            .sidebar.collapsed {
                width: 100% !important;
                max-height: 50px;
                overflow: hidden;
            }

            .sidebar-toggle {
                margin-top: 0;
                margin-bottom: 0;
                width: auto;
                padding: 10px 15px;
            }

            .sidebar .sidebar-toggle-expand {
                display: none !important;
            }

            .sidebar.collapsed .sidebar-toggle {
                display: block !important;
            }

            .sidebar-content {
                display: flex !important;
                flex-wrap: wrap;
                gap: 10px;
                width: 100%;
            }

            .sidebar.collapsed .sidebar-content {
                display: none !important;
            }

            .settings-group {
                flex: 1 1 auto;
                min-width: 120px;
            }

            .settings-group select {
                flex: 1;
                width: 120px;
            }

            .file-input-wrapper {
                flex: 1 1 100%;
            }

            .file-input-wrapper .btn {
                width: 100%;
            }

            .main-wrapper {
                margin-top: 220px;
            }

            .main-container {
                padding: 12px;
            }

            .question-panel {
                padding: 20px;
                min-height: auto;
            }

            .question-text {
                font-size: 18px;
            }

            .option-btn {
                padding: 12px 15px;
                font-size: 14px;
            }

            .word-card {
                padding: 20px;
                min-height: 250px;
            }

            .word-text {
                font-size: 32px;
            }

            .word-meaning {
                font-size: 18px;
            }

            .one-liner-card {
                padding: 20px;
                min-height: 150px;
            }

            .one-liner-text {
                font-size: 20px;
            }

            .btn {
                padding: 12px 16px;
                font-size: 14px;
                min-height: 44px;
            }

            .navigation-buttons {
                flex-wrap: wrap;
                gap: 10px;
            }

            .navigation-buttons .btn {
                flex: 1 1 45%;
                min-width: 100px;
            }

            .stats-bar {
                flex-wrap: wrap;
                gap: 10px;
            }

            .progress-section {
                margin-bottom: 12px;
            }

            .review-question-item {
                padding: 15px;
            }

            .review-question-text {
                font-size: 16px;
            }

            .modal-content {
                width: 95%;
                max-height: 90vh;
                margin: 10px;
                padding: 15px;
            }

            .flagged-item {
                padding: 12px;
            }

            h1 {
                font-size: 20px;
            }

            h2 {
                font-size: 18px;
            }

            .header h1 {
                font-size: 18px;
                margin-right: 10px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                max-height: 250px;
            }

            .main-wrapper {
                margin-top: 280px;
            }

            .settings-group {
                min-width: 100%;
            }

            .navigation-buttons .btn {
                flex: 1 1 100%;
            }

            .word-text {
                font-size: 28px;
            }

            .question-text {
                font-size: 16px;
            }

            .btn {
                padding: 10px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar collapsed">
            <button class="sidebar-toggle" onclick="app.toggleSidebar()">☰</button>
            <div class="sidebar-content">
                <button class="sidebar-toggle-expand" onclick="app.toggleSidebar()">☰ Collapse</button>
                <div class="settings-group">
                    <label for="appModeSelect">App:</label>
                    <select id="appModeSelect" onchange="app.onAppModeChange()">
                        <option value="wordlist">Word List</option>
                        <option value="oneliner">One Liner Q</option>
                        <option value="quiz">Quiz</option>
                    </select>
                </div>
                <div id="quizOptions">
                    <div style="border-top: 1px solid #e0e0e0; margin-top: 20px; padding-top: 20px;">
                        <div class="settings-group">
                            <label for="examMode">Mode:</label>
                            <select id="examMode" onchange="app.onExamModeChange()">
                                <option value="Study">Study</option>
                                <option value="Exam">Exam</option>
                            </select>
                        </div>
                    </div>
                    <div class="settings-group" id="answersModeGroup" style="padding-bottom: 20px; border-bottom: 1px solid #e0e0e0;">
                        <label for="answersMode">Answers:</label>
                        <select id="answersMode" onchange="app.onAnswersModeChange()">
                            <option value="Highlight">Highlight</option>
                            <option value="ShowAnswer">Show Answer</option>
                        </select>
                    </div>
                    <div class="file-input-wrapper" style="margin-top: 240px; width: 100%;">
                        <input type="file" id="fileInput" accept=".txt">
                        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()" style="width: 100%;">
                            📂 Import Questions
                        </button>
                    </div>
                    <button class="btn btn-secondary" id="shuffleQuizBtn" onclick="app.shuffleQuizQuestions()" style="width: 100%; margin-top: 10px;" disabled>
                        🔀 Shuffle Questions
                    </button>
                    <button class="btn btn-secondary" id="exportBtn" onclick="app.exportMissed()" style="width: 100%; margin-top: 10px;">
                        📥 Export Wrong Answers
                    </button>
                </div>
                <div id="wordListOptions" style="display: none;">
                    <div class="file-input-wrapper" style="margin-top: 20px; width: 100%;">
                        <input type="file" id="wordFileInput" accept=".csv,.txt">
                        <button class="btn btn-primary" onclick="document.getElementById('wordFileInput').click()" style="width: 100%;">
                            📂 Import Words
                        </button>
                    </div>
                    <label class="shuffle-checkbox" style="display: flex; align-items: center; gap: 8px; margin-top: 20px; cursor: pointer;">
                        <input type="checkbox" id="shuffleWordsCheck" onchange="app.toggleShuffleMode()">
                        <span>🔀 Shuffle</span>
                    </label>
                    <label class="swap-checkbox" style="display: flex; align-items: center; gap: 8px; margin-top: 10px; cursor: pointer;">
                        <input type="checkbox" id="swapWordsCheck" onchange="app.toggleSwapMode()">
                        <span>Swap (Meaning → Word)</span>
                    </label>
                    <button class="btn btn-secondary" id="reviewWordFlaggedBtn" onclick="app.reviewWordFlags()" style="width: 100%; margin-top: 10px;" disabled>
                        ⚑ Review Flagged
                    </button>
                    <button class="btn btn-secondary" id="exportWordFlaggedBtn" onclick="app.exportWordFlags()" style="width: 100%; margin-top: 10px;" disabled>
                        📥 Export Flagged
                    </button>
                </div>
                <div id="oneLinerOptions" style="display: none;">
                    <div class="file-input-wrapper" style="margin-top: 20px; width: 100%;">
                        <input type="file" id="oneLinerFileInput" accept=".txt">
                        <button class="btn btn-primary" onclick="document.getElementById('oneLinerFileInput').click()" style="width: 100%;">
                            📂 Import Text
                        </button>
                    </div>
                    <button class="btn btn-secondary" id="shuffleLinesBtn" onclick="app.shuffleLines()" style="width: 100%; margin-top: 20px;" disabled>
                        🔀 Shuffle
                    </button>
                </div>
                <button class="btn btn-secondary" id="exportFlaggedBtn" onclick="app.exportFlagged()" style="width: 100%; text-align: left;">
                    📥 Export Flagged
                </button>
                <button class="btn btn-secondary" id="clearStateBtn" onclick="app.clearAndReset()" style="width: 100%; margin-top: 20px;">
                    🗑️ Clear Progress
                </button>
                <button class="btn btn-secondary" style="width: 100%; margin-top: 20px;" onclick="window.open('README.html', '_blank')">
                    📖 Documentation
                </button>
            </div>
        </aside>

        <main class="main-wrapper">
            <header class="header">
                <h1>e-dumper <span style="font-size: 14px; color: #666;">v1.0</span></h1>
            </header>

            <div class="main-container">

    <script>
        class Question {
            constructor(id, text, options, correctAnswer) {
                this.id = id;
                this.text = text;
                this.options = options;
                this.correctAnswers = Array.isArray(correctAnswer) ? correctAnswer : [correctAnswer];
                this.userAnswers = [];
                this.isAnswered = false;
                this.isFlagged = false;
            }

            isCorrect(userAnswers) {
                if (!userAnswers || userAnswers.length === 0) return false;
                const sortedUser = [...userAnswers].sort();
                const sortedCorrect = [...this.correctAnswers].sort();
                return sortedUser.length === sortedCorrect.length && 
                       sortedUser.every((val, idx) => val === sortedCorrect[idx]);
            }

            reset() {
                this.userAnswers = [];
                this.isAnswered = false;
            }
        }

        class AppController {
            constructor() {
                this.questions = [];
                this.missedQuestions = [];
                this.currentIndex = 0;
                this.correctCount = 0;
                this.totalAnswered = 0;
                this.isFileLoaded = false;
                this.examMode = 'Study';
                this.answersMode = 'Highlight';
            }

            setExamMode(mode) {
                this.examMode = mode;
            }

            getExamMode() {
                return this.examMode;
            }

            setAnswersMode(mode) {
                this.answersMode = mode;
            }

            getAnswersMode() {
                return this.answersMode;
            }

            parseTranDumperFormat(content) {
                try {
                    const lines = content.split('\n');
                    const questions = [];
                    let currentQuestion = null;
                    let currentOptions = [];
                    let currentCorrectAnswer = null;
                    let questionId = 1;

                    for (let line of lines) {
                        line = line.trim();
                        if (!line) continue;

                        if (line.match(/^Question\s*\d*[:.]?\s*/i)) {
                            if (currentQuestion) {
                                questions.push(new Question(
                                    questionId++,
                                    currentQuestion,
                                    currentOptions,
                                    currentCorrectAnswer
                                ));
                            }
                            currentQuestion = line.replace(/^Question\s*\d*[:.]?\s*/i, '');
                            currentOptions = [];
                            currentCorrectAnswer = null;
                        } else if (line.match(/^[A-Z]\)[\s]/i) || line.match(/^[A-Z]\.\s/i)) {
                            currentOptions.push(line);
                        } else if (line.toLowerCase().startsWith('answer:')) {
                            const answer = line.replace(/^answer:\s*/i, '').trim();
                            const answers = answer.split(',').map(a => {
                                const match = a.trim().match(/^([A-Z])/i);
                                return match ? match[1].toUpperCase() : null;
                            }).filter(a => a !== null);
                            if (answers.length > 0) {
                                currentCorrectAnswer = answers;
                            }
                        }
                    }

                    if (currentQuestion && currentCorrectAnswer) {
                        questions.push(new Question(
                            questionId++,
                            currentQuestion,
                            currentOptions,
                            currentCorrectAnswer
                        ));
                    }

                    return questions;
                } catch (e) {
                    console.error('Error parsing questions:', e);
                    return [];
                }
            }

            loadQuestions(content) {
                this.questions = this.parseTranDumperFormat(content);
                this.missedQuestions = [];
                this.currentIndex = 0;
                this.correctCount = 0;
                this.totalAnswered = 0;
                this.isFileLoaded = this.questions.length > 0;
                return this.questions.length;
            }

            getCurrentQuestion() {
                return this.questions[this.currentIndex] || null;
            }

            getProgress() {
                return {
                    current: this.currentIndex + 1,
                    total: this.questions.length,
                    percentage: this.questions.length > 0 
                        ? Math.round(((this.currentIndex + 1) / this.questions.length) * 100)
                        : 0
                };
            }

            getStats() {
                const flagged = this.questions.filter(q => q.isFlagged).length;
                return {
                    correct: this.correctCount,
                    answered: this.totalAnswered,
                    flagged: flagged,
                    missed: this.missedQuestions.length
                };
            }

            getFlaggedQuestions() {
                return this.questions.filter(q => q.isFlagged);
            }

            nextQuestion() {
                if (this.currentIndex < this.questions.length - 1) {
                    this.currentIndex++;
                    return true;
                }
                return false;
            }

            prevQuestion() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    return true;
                }
                return false;
            }

            submitAnswer(answers) {
                const question = this.getCurrentQuestion();
                if (!question || question.isAnswered) return null;

                question.userAnswers = answers;
                question.isAnswered = true;
                this.totalAnswered++;

                const isCorrect = question.isCorrect(answers);
                if (isCorrect) {
                    this.correctCount++;
                } else {
                    if (!this.missedQuestions.includes(question)) {
                        this.missedQuestions.push(question);
                    }
                }

                return {
                    isCorrect: isCorrect,
                    correctAnswers: question.correctAnswers
                };
            }

            toggleFlag() {
                const question = this.getCurrentQuestion();
                if (question) {
                    question.isFlagged = !question.isFlagged;
                    return question.isFlagged;
                }
                return false;
            }

            exportWrongAnswers() {
                if (this.missedQuestions.length === 0) {
                    return null;
                }

                let content = '';
                for (let q of this.missedQuestions) {
                    content += `Question ${q.id}: ${q.text}\n`;
                    for (let opt of q.options) {
                        content += `${opt}\n`;
                    }
                    content += `Answer: ${q.correctAnswer}\n\n`;
                }

                return content;
            }

            exportFlaggedAnswers() {
                const flaggedQuestions = this.questions.filter(q => q.isFlagged);
                if (flaggedQuestions.length === 0) {
                    return null;
                }

                let content = '';
                for (let q of flaggedQuestions) {
                    content += `Question ${q.id}: ${q.text}\n`;
                    for (let opt of q.options) {
                        content += `${opt}\n`;
                    }
                    content += `Answer: ${q.correctAnswers.join(',')}\n\n`;
                }

                return content;
            }

            canGoNext() {
                return this.currentIndex < this.questions.length - 1;
            }

            canGoPrev() {
                return this.currentIndex > 0;
            }
        }

        const controller = new AppController();

        const app = {
            selectedOptions: [],
            
            // Word list state
            wordList: [],
            wordIndex: 0,
            wordMeaningShown: false,
            flaggedWords: [],
            swapMode: false,
            shuffleMode: false,
            
            // One Liner state
            oneLinerLines: [],
            oneLinerIndex: 0,
            
            appMode: 'quiz',

            // LocalStorage functions
            saveState() {
                try {
                    const state = {
                        appMode: app.appMode,
                        quiz: {
                            questions: controller.questions.map(q => ({
                                id: q.id,
                                text: q.text,
                                options: q.options,
                                correctAnswers: q.correctAnswers,
                                isAnswered: q.isAnswered,
                                userAnswers: q.userAnswers,
                                isFlagged: q.isFlagged
                            })),
                            currentIndex: controller.currentIndex,
                            missedQuestions: controller.missedQuestions.map(q => q.id),
                            correctCount: controller.correctCount,
                            totalAnswered: controller.totalAnswered
                        },
                        wordList: {
                            words: app.wordList,
                            index: app.wordIndex,
                            flaggedIndices: app.flaggedWords,
                            swapMode: app.swapMode,
                            shuffleMode: app.shuffleMode
                        },
                        oneLiner: {
                            lines: app.oneLinerLines,
                            index: app.oneLinerIndex
                        }
                    };
                    localStorage.setItem('edumperState', JSON.stringify(state));
                } catch (e) {
                    console.warn('Could not save state:', e);
                }
            },

            loadState() {
                try {
                    const saved = localStorage.getItem('edumperState');
                    if (!saved) return false;
                    
                    const state = JSON.parse(saved);
                    
                    // Restore app mode
                    if (state.appMode) {
                        document.getElementById('appModeSelect').value = state.appMode;
                        app.appMode = state.appMode;
                    }
                    
                    // Restore quiz state
                    if (state.quiz && state.quiz.questions && state.quiz.questions.length > 0) {
                        controller.questions = state.quiz.questions.map(q => {
                            const question = new Question(q.id, q.text, q.options, q.correctAnswers);
                            question.isAnswered = q.isAnswered;
                            question.userAnswers = q.userAnswers || [];
                            question.isFlagged = q.isFlagged;
                            return question;
                        });
                        controller.currentIndex = state.quiz.currentIndex || 0;
                        controller.correctCount = state.quiz.correctCount || 0;
                        controller.totalAnswered = state.quiz.totalAnswered || 0;
                        controller.isFileLoaded = true;
                        
                        // Restore missed questions
                        controller.missedQuestions = state.quiz.missedQuestions || [];
                        
                        if (controller.questions.length > 0) {
                            app.selectedOptions = [];
                            app.render();
                            app.updateButtons();
                        }
                    }
                    
                    // Restore word list state
                    if (state.wordList && state.wordList.words && state.wordList.words.length > 0) {
                        app.wordList = state.wordList.words;
                        app.wordIndex = state.wordList.index || 0;
                        app.flaggedWords = state.wordList.flaggedIndices || [];
                        app.swapMode = state.wordList.swapMode || false;
                        app.shuffleMode = state.wordList.shuffleMode || false;
                        document.getElementById('swapWordsCheck').checked = app.swapMode;
                        document.getElementById('shuffleWordsCheck').checked = app.shuffleMode;
                        if (app.appMode === 'wordlist') {
                            app.renderWordCard();
                            app.updateWordButtons();
                        }
                    }
                    
                    // Restore one liner state
                    if (state.oneLiner && state.oneLiner.lines && state.oneLiner.lines.length > 0) {
                        app.oneLinerLines = state.oneLiner.lines;
                        app.oneLinerIndex = state.oneLiner.index || 0;
                        if (app.appMode === 'oneliner') {
                            app.renderOneLinerCard();
                        }
                    }
                    
                    return true;
                } catch (e) {
                    console.warn('Could not load state:', e);
                    return false;
                }
            },

            clearState() {
                try {
                    localStorage.removeItem('edumperState');
                } catch (e) {
                    console.warn('Could not clear state:', e);
                }
            },

            clearAndReset() {
                if (confirm('Are you sure you want to clear all saved progress? This cannot be undone.')) {
                    app.clearState();
                    location.reload();
                }
            },

            init() {
                document.getElementById('fileInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onerror = () => {
                            alert('Error reading file. Please try again.');
                        };
                        reader.onload = (event) => {
                            try {
                                const content = event.target.result;
                                const count = controller.loadQuestions(content);
                                alert(`Parsed ${count} questions from file`);
                                if (count > 0) {
                                    document.getElementById('emptyState').classList.add('hidden');
                                    document.getElementById('studyArea').classList.remove('hidden');
                                    app.selectedOptions = [];
                                    app.render();
                                    app.collapseSidebar();
                                    document.getElementById('shuffleQuizBtn').disabled = false;
                                    app.saveState();
                                } else {
                                    alert('No questions found. Check your file format matches:\n\nQuestion 1: Your question?\nA) Option 1\nB) Option 2\nAnswer: A');
                                }
                            } catch (e) {
                                console.error('Error processing questions:', e);
                                alert('Error processing file. Please check the format.');
                            }
                        };
                        reader.readAsText(file);
                    }
                });

                // Word list file input
                document.getElementById('wordFileInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onerror = () => {
                            alert('Error reading file. Please try again.');
                        };
                        reader.onload = (event) => {
                            app.loadWordList(event.target.result);
                        };
                        reader.readAsText(file);
                    }
                });

                // One Liner file input
                document.getElementById('oneLinerFileInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onerror = () => {
                            alert('Error reading file. Please try again.');
                        };
                        reader.onload = (event) => {
                            app.loadOneLiner(event.target.result);
                        };
                        reader.readAsText(file);
                    }
                });

                // Initialize app mode
                app.onAppModeChange();

                document.addEventListener('keydown', (e) => {
                    const studyArea = document.getElementById('studyArea');
                    const wordListArea = document.getElementById('wordListArea');
                    const oneLinerArea = document.getElementById('oneLinerArea');
                    
                    // Word List mode navigation
                    if (!wordListArea.classList.contains('hidden')) {
                        if (e.key === 'ArrowRight') {
                            app.nextWord();
                        } else if (e.key === 'ArrowLeft') {
                            app.prevWord();
                        } else if (e.key === 'ArrowUp') {
                            app.showWordMeaning();
                        } else if (e.key === 'm' || e.key === 'M') {
                            app.toggleWordFlag();
                        }
                        return;
                    }
                    
                    // One Liner mode navigation
                    if (!oneLinerArea.classList.contains('hidden')) {
                        if (e.key === 'ArrowRight') {
                            app.nextOneLiner();
                        } else if (e.key === 'ArrowLeft') {
                            app.prevOneLiner();
                        }
                        return;
                    }
                    
                    // Quiz mode navigation
                    if (studyArea.classList.contains('hidden')) return;

                    if (e.key === 'ArrowRight') {
                        app.next();
                    } else if (e.key === 'ArrowLeft') {
                        app.prev();
                    } else if (e.key === 'm' || e.key === 'M') {
                        app.toggleFlag();
                    }
                });
            },

            toggleSidebar() {
                const sidebar = document.querySelector('.sidebar');
                sidebar.classList.toggle('collapsed');
            },

            collapseSidebar() {
                const sidebar = document.querySelector('.sidebar');
                sidebar.classList.add('collapsed');
            },

            onExamModeChange() {
                const examMode = document.getElementById('examMode').value;
                const answersModeGroup = document.getElementById('answersModeGroup');
                const endExamBtn = document.getElementById('endExamBtn');
                
                controller.setExamMode(examMode);
                
                if (examMode === 'Study') {
                    answersModeGroup.classList.remove('hidden');
                    document.getElementById('answersMode').value = 'Highlight';
                    controller.setAnswersMode('Highlight');
                    endExamBtn.style.display = 'none';
                } else {
                    answersModeGroup.classList.add('hidden');
                    endExamBtn.style.display = 'inline-flex';
                }
            },

            onAnswersModeChange() {
                const answersMode = document.getElementById('answersMode').value;
                controller.setAnswersMode(answersMode);
                this.render();
            },

            onAppModeChange() {
                const appMode = document.getElementById('appModeSelect').value;
                app.appMode = appMode;
                
                const quizOptions = document.getElementById('quizOptions');
                const wordListOptions = document.getElementById('wordListOptions');
                const oneLinerOptions = document.getElementById('oneLinerOptions');
                const exportFlaggedBtn = document.getElementById('exportFlaggedBtn');
                
                if (appMode === 'quiz') {
                    quizOptions.style.display = 'block';
                    wordListOptions.style.display = 'none';
                    oneLinerOptions.style.display = 'none';
                    document.getElementById('wordListArea').classList.add('hidden');
                    document.getElementById('oneLinerArea').classList.add('hidden');
                    document.getElementById('studyArea').classList.remove('hidden');
                    exportFlaggedBtn.style.display = 'block';
                } else if (appMode === 'wordlist') {
                    quizOptions.style.display = 'none';
                    wordListOptions.style.display = 'block';
                    oneLinerOptions.style.display = 'none';
                    document.getElementById('studyArea').classList.add('hidden');
                    document.getElementById('oneLinerArea').classList.add('hidden');
                    document.getElementById('wordListArea').classList.remove('hidden');
                    exportFlaggedBtn.style.display = 'none';
                } else if (appMode === 'oneliner') {
                    quizOptions.style.display = 'none';
                    wordListOptions.style.display = 'none';
                    oneLinerOptions.style.display = 'block';
                    document.getElementById('studyArea').classList.add('hidden');
                    document.getElementById('wordListArea').classList.add('hidden');
                    document.getElementById('oneLinerArea').classList.remove('hidden');
                    exportFlaggedBtn.style.display = 'none';
                }
            },

            loadWordList(content) {
                try {
                    const lines = content.split('\n');
                    app.wordList = [];
                    app.wordIndex = 0;
                    app.flaggedWords = [];
                    
                    for (let line of lines) {
                        line = line.trim();
                        if (!line) continue;
                        
                        // Handle both "word,meaning" and "word|meaning" formats
                        let parts = line.split(',');
                        if (parts.length < 2) {
                            parts = line.split('|');
                        }
                        
                        if (parts.length >= 2) {
                            app.wordList.push({
                                word: parts[0].trim(),
                                meaning: parts.slice(1).join(',').trim(),
                                isFlagged: false
                            });
                        }
                    }
                    
                    if (app.wordList.length > 0) {
                        if (app.shuffleMode) {
                            app.shuffleWords();
                        }
                        alert(`Loaded ${app.wordList.length} words`);
                        document.getElementById('emptyState').classList.add('hidden');
                        document.getElementById('wordListArea').classList.remove('hidden');
                        app.renderWordCard();
                        app.collapseSidebar();
                        app.updateWordButtons();
                        app.saveState();
                    } else {
                        alert('No words found. Please use format: word,meaning');
                    }
                } catch (e) {
                    console.error('Error loading word list:', e);
                    alert('Error loading word list. Please check the file format.');
                }
            },

            renderWordCard() {
                if (app.wordList.length === 0) return;
                
                const word = app.wordList[app.wordIndex];
                
                if (app.swapMode) {
                    document.getElementById('wordText').textContent = word.meaning;
                    document.getElementById('wordMeaning').textContent = word.word;
                } else {
                    document.getElementById('wordText').textContent = word.word;
                    document.getElementById('wordMeaning').textContent = word.meaning;
                }
                document.getElementById('wordMeaning').classList.remove('show', 'revealed');
                app.wordMeaningShown = false;
                
                // Update progress
                document.getElementById('wordProgressText').textContent = 
                    `Word ${app.wordIndex + 1} of ${app.wordList.length}`;
                document.getElementById('wordProgressPercent').textContent = 
                    `${Math.round(((app.wordIndex + 1) / app.wordList.length) * 100)}%`;
                document.getElementById('wordProgressFill').style.width = 
                    `${Math.round(((app.wordIndex + 1) / app.wordList.length) * 100)}%`;
                
                // Update flagged badge
                const flaggedBadge = document.getElementById('wordFlaggedBadge');
                if (word.isFlagged) {
                    flaggedBadge.classList.remove('hidden');
                } else {
                    flaggedBadge.classList.add('hidden');
                }
                
                // Update button states
                document.getElementById('wordPrevBtn').disabled = app.wordIndex === 0;
                document.getElementById('wordNextBtn').disabled = app.wordIndex === app.wordList.length - 1;
                
                // Update show meaning button
                document.getElementById('showMeaningBtn').textContent = 'Show Meaning';
            },

            showWordMeaning() {
                const meaningEl = document.getElementById('wordMeaning');
                meaningEl.classList.add('show', 'revealed');
                app.wordMeaningShown = true;
                document.getElementById('showMeaningBtn').textContent = 'Meaning Shown';
            },

            toggleWordFlag() {
                if (app.wordList.length === 0) return;
                
                const word = app.wordList[app.wordIndex];
                word.isFlagged = !word.isFlagged;
                
                if (word.isFlagged) {
                    if (!app.flaggedWords.includes(app.wordIndex)) {
                        app.flaggedWords.push(app.wordIndex);
                    }
                } else {
                    const idx = app.flaggedWords.indexOf(app.wordIndex);
                    if (idx > -1) app.flaggedWords.splice(idx, 1);
                }
                
                app.renderWordCard();
                app.updateWordButtons();
                app.saveState();
            },

            jumpToWord() {
                const input = document.getElementById('jumpToWordInput');
                const wordNumber = parseInt(input.value);
                
                if (isNaN(wordNumber) || wordNumber < 1) {
                    alert('Please enter a valid word number (1-' + app.wordList.length + ')');
                    return;
                }
                
                if (wordNumber > app.wordList.length) {
                    alert('Word number exceeds total words (' + app.wordList.length + ')');
                    return;
                }
                
                app.wordIndex = wordNumber - 1;
                app.renderWordCard();
                app.saveState();
                input.value = '';
            },

            initJumpToWordListener() {
                document.getElementById('jumpToWordInput').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        app.jumpToWord();
                    }
                });
            },

            nextWord() {
                if (app.wordIndex < app.wordList.length - 1) {
                    app.wordIndex++;
                    app.renderWordCard();
                    app.saveState();
                }
            },

            prevWord() {
                if (app.wordIndex > 0) {
                    app.wordIndex--;
                    app.renderWordCard();
                    app.saveState();
                }
            },

            toggleShuffleMode() {
                const checkbox = document.getElementById('shuffleWordsCheck');
                app.shuffleMode = checkbox.checked;
                
                if (app.shuffleMode && app.wordList.length > 0) {
                    this.shuffleWords();
                } else if (app.wordList.length > 0) {
                    app.wordIndex = 0;
                    app.renderWordCard();
                }
                app.saveState();
            },

            shuffleWords() {
                if (app.wordList.length === 0) return;
                
                // Fisher-Yates shuffle
                for (let i = app.wordList.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [app.wordList[i], app.wordList[j]] = [app.wordList[j], app.wordList[i]];
                }
                
                app.wordIndex = 0;
                app.renderWordCard();
                app.saveState();
            },

            toggleSwapMode() {
                const checkbox = document.getElementById('swapWordsCheck');
                app.swapMode = checkbox.checked;
                app.renderWordCard();
                app.saveState();
            },

            updateWordButtons() {
                document.getElementById('shuffleWordsCheck').disabled = app.wordList.length === 0;
                document.getElementById('swapWordsCheck').disabled = app.wordList.length === 0;
                
                const flaggedCount = app.flaggedWords.length;
                document.getElementById('reviewWordFlaggedBtn').disabled = flaggedCount === 0;
                document.getElementById('reviewWordFlaggedBtn').textContent = `⚑ Review Flagged (${flaggedCount})`;
                
                document.getElementById('exportWordFlaggedBtn').disabled = flaggedCount === 0;
            },

            reviewWordFlags() {
                if (app.flaggedWords.length === 0) {
                    alert('No flagged words to review.');
                    return;
                }
                
                // Go to first flagged word
                app.wordIndex = app.flaggedWords[0];
                app.renderWordCard();
            },

            exportWordFlags() {
                if (app.flaggedWords.length === 0) {
                    alert('No flagged words to export.');
                    return;
                }
                
                let content = '';
                for (let idx of app.flaggedWords) {
                    const word = app.wordList[idx];
                    content += `${word.word},${word.meaning}\n`;
                }
                
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'flagged_words_export.csv';
                a.click();
                URL.revokeObjectURL(url);
            },

            // One Liner functions
            loadOneLiner(content) {
                try {
                    const lines = content.split('\n');
                    app.oneLinerLines = [];
                    app.oneLinerIndex = 0;
                    
                    for (let line of lines) {
                        line = line.trim();
                        if (line) {
                            app.oneLinerLines.push(line);
                        }
                    }
                    
                    if (app.oneLinerLines.length > 0) {
                        alert(`Loaded ${app.oneLinerLines.length} lines`);
                        app.renderOneLinerCard();
                        app.collapseSidebar();
                        app.saveState();
                    } else {
                        alert('No text found in file.');
                    }
                } catch (e) {
                    console.error('Error loading one liner:', e);
                    alert('Error loading text file.');
                }
            },

            renderOneLinerCard() {
                if (app.oneLinerLines.length === 0) return;
                
                const line = app.oneLinerLines[app.oneLinerIndex];
                document.getElementById('oneLinerText').textContent = line;
                
                // Update progress
                document.getElementById('oneLinerProgressText').textContent = 
                    `Line ${app.oneLinerIndex + 1} of ${app.oneLinerLines.length}`;
                document.getElementById('oneLinerProgressPercent').textContent = 
                    `${Math.round(((app.oneLinerIndex + 1) / app.oneLinerLines.length) * 100)}%`;
                document.getElementById('oneLinerProgressFill').style.width = 
                    `${Math.round(((app.oneLinerIndex + 1) / app.oneLinerLines.length) * 100)}%`;
                
                // Update button states
                document.getElementById('oneLinerPrevBtn').disabled = app.oneLinerIndex === 0;
                document.getElementById('oneLinerNextBtn').disabled = app.oneLinerIndex === app.oneLinerLines.length - 1;
                
                // Enable shuffle button
                document.getElementById('shuffleLinesBtn').disabled = false;
            },

            nextOneLiner() {
                if (app.oneLinerIndex < app.oneLinerLines.length - 1) {
                    app.oneLinerIndex++;
                    app.renderOneLinerCard();
                    app.saveState();
                }
            },

            prevOneLiner() {
                if (app.oneLinerIndex > 0) {
                    app.oneLinerIndex--;
                    app.renderOneLinerCard();
                    app.saveState();
                }
            },

            shuffleLines() {
                if (app.oneLinerLines.length === 0) return;
                
                // Fisher-Yates shuffle
                for (let i = app.oneLinerLines.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [app.oneLinerLines[i], app.oneLinerLines[j]] = [app.oneLinerLines[j], app.oneLinerLines[i]];
                }
                
                app.oneLinerIndex = 0;
                app.renderOneLinerCard();
            },

            render() {
                const question = controller.getCurrentQuestion();
                if (!question) return;

                app.selectedOptions = [];

                document.getElementById('questionText').textContent = question.text;
                
                const flaggedBadge = document.getElementById('flaggedBadge');
                if (question.isFlagged) {
                    flaggedBadge.classList.remove('hidden');
                } else {
                    flaggedBadge.classList.add('hidden');
                }

                this.renderOptions(question);
                this.updateProgress();
                this.updateStats();
                this.updateNavigation();
                this.updateFeedback();
                this.updateButtons();
            },

            renderOptions(question) {
                const container = document.getElementById('optionsContainer');
                container.innerHTML = '';

                const optionLetters = ['A', 'B', 'C', 'D', 'E', 'F'];
                const correctAnswers = question.correctAnswers;
                const isMultiAnswer = correctAnswers.length > 1;
                const examMode = controller.getExamMode();
                const answersMode = controller.getAnswersMode();

                question.options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    
                    const optionLetter = optionLetters[index];
                    const isSelected = app.selectedOptions.includes(optionLetter);
                    const isCorrectAnswer = correctAnswers.includes(optionLetter);

                    if (question.isAnswered) {
                        btn.disabled = true;
                        if (isCorrectAnswer) {
                            btn.classList.add('correct');
                        }
                        if (isSelected && !isCorrectAnswer) {
                            btn.classList.add('incorrect');
                        }
                    } else if (examMode === 'Study' && answersMode === 'Highlight') {
                        if (isCorrectAnswer) {
                            btn.classList.add('correct');
                        }
                        if (isSelected) {
                            btn.classList.add('selected');
                        }
                        btn.onclick = () => {
                            app.toggleOption(optionLetter);
                        };
                    } else {
                        if (isSelected) {
                            btn.classList.add('selected');
                        }
                        btn.onclick = () => {
                            app.toggleOption(optionLetter);
                        };
                    }

                    container.appendChild(btn);
                });
            },

            toggleOption(optionLetter) {
                const question = controller.getCurrentQuestion();
                const examMode = controller.getExamMode();
                const answersMode = controller.getAnswersMode();
                const isMulti = question.correctAnswers.length > 1;
                
                const idx = app.selectedOptions.indexOf(optionLetter);
                if (idx > -1) {
                    app.selectedOptions.splice(idx, 1);
                } else {
                    app.selectedOptions.push(optionLetter);
                }
                
                this.renderOptions(question);
                this.updateSubmitButton();
                
                // Auto-submit only for single-answer questions in Study mode with Highlight
                if (examMode === 'Study' && answersMode === 'Highlight' && !isMulti && app.selectedOptions.length > 0) {
                    this.submitAnswer();
                }
            },

            updateSubmitButton() {
                const submitBtn = document.getElementById('submitAnswerBtn');
                submitBtn.disabled = app.selectedOptions.length === 0;
            },

            updateProgress() {
                const progress = controller.getProgress();
                document.getElementById('progressText').textContent = 
                    `Question ${progress.current} of ${progress.total}`;
                document.getElementById('progressPercent').textContent = 
                    `${progress.percentage}%`;
                document.getElementById('progressFill').style.width = 
                    `${progress.percentage}%`;
            },

            updateStats() {
                const stats = controller.getStats();
                document.getElementById('statCorrect').textContent = stats.correct;
                document.getElementById('statWrong').textContent = stats.missed;
                document.getElementById('statFlagged').textContent = stats.flagged;
            },

            updateNavigation() {
                document.getElementById('prevBtn').disabled = !controller.canGoPrev();
                document.getElementById('nextBtn').disabled = !controller.canGoNext();
            },

            updateFeedback() {
                const question = controller.getCurrentQuestion();
                const panel = document.getElementById('feedbackPanel');
                
                if (!question.isAnswered) {
                    panel.classList.remove('show');
                    return;
                }

                const correctStr = question.correctAnswers.join(', ');
                panel.classList.add('show');
                if (question.isCorrect(question.userAnswers)) {
                    panel.className = 'feedback-panel show correct';
                    panel.textContent = `✓ Correct! (${correctStr})`;
                } else {
                    panel.className = 'feedback-panel show incorrect';
                    panel.textContent = `✗ Incorrect. The correct answer is ${correctStr}`;
                }
            },

            updateButtons() {
                const question = controller.getCurrentQuestion();
                const showAnswerBtn = document.getElementById('showAnswerBtn');
                const flagBtn = document.getElementById('flagBtn');
                const submitBtn = document.getElementById('submitAnswerBtn');
                
                const examMode = controller.getExamMode();
                const answersMode = controller.getAnswersMode();
                const isMulti = question.correctAnswers.length > 1;
                
                if (examMode === 'Study') {
                    // Show Submit button for multi-select, Show Answer for single-select in Study mode
                    submitBtn.style.display = isMulti ? 'inline-flex' : 'none';
                    submitBtn.disabled = app.selectedOptions.length === 0 || question.isAnswered;
                    showAnswerBtn.style.display = answersMode === 'ShowAnswer' && !isMulti ? 'inline-flex' : 'none';
                    showAnswerBtn.disabled = question.isAnswered;
                } else {
                    submitBtn.style.display = isMulti ? 'inline-flex' : 'none';
                    submitBtn.disabled = app.selectedOptions.length === 0 || question.isAnswered;
                    showAnswerBtn.style.display = 'none';
                }
                
                if (question.isFlagged) {
                    flagBtn.textContent = '⚑ Unflag';
                } else {
                    flagBtn.textContent = '⚑ Flag for Review';
                }

                const exportBtn = document.getElementById('exportBtn');
                exportBtn.disabled = controller.missedQuestions.length === 0;

                const flaggedCount = controller.getFlaggedQuestions().length;

                const exportFlaggedBtn = document.getElementById('exportFlaggedBtn');
                exportFlaggedBtn.disabled = flaggedCount === 0;

                const reviewFlaggedBtn = document.getElementById('reviewFlaggedBtn');
                reviewFlaggedBtn.disabled = flaggedCount === 0;
                reviewFlaggedBtn.textContent = `⚑ Review Flagged (${flaggedCount})`;
            },

            submitAnswer() {
                if (app.selectedOptions.length === 0) return;
                const result = controller.submitAnswer(app.selectedOptions);
                if (result) {
                    this.render();
                    this.saveState();
                }
            },

            showAnswer() {
                const question = controller.getCurrentQuestion();
                if (question && !question.isAnswered) {
                    question.isAnswered = true;
                    question.userAnswers = [];
                    this.render();
                }
            },

            toggleFlag() {
                controller.toggleFlag();
                this.render();
                this.saveState();
            },

            next() {
                if (controller.nextQuestion()) {
                    this.render();
                    this.saveState();
                }
            },

            prev() {
                if (controller.prevQuestion()) {
                    this.render();
                    this.saveState();
                }
            },

            shuffleQuizQuestions() {
                if (controller.questions.length === 0) return;
                
                // Fisher-Yates shuffle
                for (let i = controller.questions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [controller.questions[i], controller.questions[j]] = [controller.questions[j], controller.questions[i]];
                }
                
                controller.currentIndex = 0;
                app.selectedOptions = [];
                app.render();
            },

            exportMissed() {
                const content = controller.exportWrongAnswers();
                if (!content) {
                    alert('No wrong answers to export yet!');
                    return;
                }

                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'wrong_answers_export.txt';
                a.click();
                URL.revokeObjectURL(url);
            },

            exportFlagged() {
                const content = controller.exportFlaggedAnswers();
                if (!content) {
                    alert('No flagged questions to export!');
                    return;
                }

                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'flagged_questions_export.txt';
                a.click();
                URL.revokeObjectURL(url);
            },

            reviewFlagged() {
                const flaggedQuestions = controller.getFlaggedQuestions();
                if (flaggedQuestions.length === 0) {
                    alert('No flagged questions to review.');
                    return;
                }

                const modal = document.getElementById('flaggedModal');
                const listContainer = document.getElementById('flaggedList');
                listContainer.innerHTML = '';

                flaggedQuestions.forEach((q, index) => {
                    const item = document.createElement('div');
                    item.className = 'flagged-item';
                    item.innerHTML = `
                        <div class="flagged-item-number">Question ${index + 1}</div>
                        <div class="flagged-item-text">${q.text.substring(0, 100)}${q.text.length > 100 ? '...' : ''}</div>
                    `;
                    item.onclick = () => {
                        this.goToFlaggedQuestion(q);
                    };
                    listContainer.appendChild(item);
                });

                modal.classList.remove('hidden');
            },

            closeFlaggedModal() {
                document.getElementById('flaggedModal').classList.add('hidden');
            },

            goToFlaggedQuestion(question) {
                const index = controller.questions.indexOf(question);
                if (index !== -1) {
                    controller.currentIndex = index;
                    this.closeFlaggedModal();
                    this.render();
                }
            },

            endExam() {
                const studyArea = document.getElementById('studyArea');
                const reviewArea = document.getElementById('reviewArea');
                
                studyArea.classList.add('hidden');
                reviewArea.classList.remove('hidden');
                
                this.renderReviewPage();
            },

            renderReviewPage() {
                const questions = controller.questions;
                const stats = controller.getStats();
                
                const reviewStats = document.getElementById('reviewStats');
                reviewStats.innerHTML = `
                    <span class="correct">✓ Correct: ${stats.correct}</span>
                    <span class="incorrect">✗ Incorrect: ${stats.missed}</span>
                    <span>Total: ${questions.length}</span>
                `;
                
                const reviewQuestions = document.getElementById('reviewQuestions');
                reviewQuestions.innerHTML = '';
                
                questions.forEach((q, index) => {
                    const isCorrect = q.isAnswered && q.isCorrect(q.userAnswers);
                    const item = document.createElement('div');
                    item.className = `review-question-item ${isCorrect ? 'correct' : 'incorrect'}`;
                    
                    let optionsHtml = '';
                    const optionLetters = ['A', 'B', 'C', 'D', 'E', 'F'];
                    
                    q.options.forEach((opt, optIndex) => {
                        const optionLetter = optionLetters[optIndex];
                        const isCorrectOption = q.correctAnswers.includes(optionLetter);
                        const isSelected = q.userAnswers.includes(optionLetter);
                        
                        let optionClass = 'review-option';
                        if (isCorrectOption) optionClass += ' correct';
                        if (isSelected) optionClass += ' selected';
                        
                        optionsHtml += `<div class="${optionClass}">${opt}</div>`;
                    });
                    
                    item.innerHTML = `
                        <div class="review-question-status ${isCorrect ? 'correct' : 'incorrect'}">
                            ${isCorrect ? '✓ Correct' : '✗ Incorrect'}
                        </div>
                        <div class="review-question-text">${index + 1}. ${q.text}</div>
                        ${optionsHtml}
                    `;
                    
                    reviewQuestions.appendChild(item);
                });
            },

            closeReview() {
                const studyArea = document.getElementById('studyArea');
                const reviewArea = document.getElementById('reviewArea');
                
                reviewArea.classList.add('hidden');
                studyArea.classList.remove('hidden');
            }
        };

        app.init();
        app.loadState();
        app.onAppModeChange();
        app.initJumpToWordListener();
    </script>

    <div id="flaggedModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Flagged Questions</h2>
                <button class="modal-close" onclick="app.closeFlaggedModal()">&times;</button>
            </div>
            <div id="flaggedList" class="flagged-list">
            </div>
        </div>
    </div>
</body>
</html>
